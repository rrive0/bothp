<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JUTI FIVEM SUPPORT · EVOLUTION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0e1a;
    --card: rgba(255, 255, 255, 0.055);
    --card-border: rgba(255, 255, 255, 0.12);
    --violet: #7c5cff;
    --cyan: #22d3ee;
    --pink: #ff6ec7;
    --text: #f5f6fa;
    --muted: #9aa1b4;
    --ok: #34d399;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  .blob { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.4; z-index: 0; pointer-events: none; will-change: transform; }
  .blob.one { width: 520px; height: 520px; background: var(--violet); top: -160px; left: -120px; animation: drift1 17s ease-in-out infinite; }
  .blob.two { width: 460px; height: 460px; background: var(--cyan); bottom: -180px; right: -100px; animation: drift2 19s ease-in-out infinite; }
  .blob.three { width: 360px; height: 360px; background: var(--pink); top: 35%; left: 55%; opacity: 0.16; animation: drift1 23s ease-in-out infinite reverse; }

  .grain {
    position: fixed; inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
    background-size: 28px 28px;
    z-index: 0; pointer-events: none;
  }

  /* Header */
  .nav-bar {
    position: fixed;
    top: 18px; left: 18px; right: 18px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--card);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(18px);
    border-radius: 22px;
    padding: 12px 22px;
  }

  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--violet), var(--cyan));
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 18px; height: 18px; color: white; }
  .logo-text {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.01em;
  }
  .logo-text span { color: var(--cyan); }
  .tag-pill {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--card-border);
    padding: 4px 11px;
    border-radius: 999px;
    text-transform: uppercase;
  }

  .nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .nav-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    color: var(--text);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
  }
  .nav-pill svg { width: 15px; height: 15px; color: var(--cyan); }
  .nav-pill:hover { transform: translateY(-1px); background: rgba(124,92,255,0.18); border-color: var(--violet); }
  .nav-pill.exit svg { color: #ff8fa3; }
  .nav-pill.exit:hover { background: rgba(255, 80, 110, 0.16); border-color: #ff5d7a; }

  /* Hero */
  .hero {
    position: relative;
    z-index: 5;
    max-width: 720px;
    margin: 0 auto;
    padding: 150px 20px 40px;
    text-align: center;
  }

  .icon-badge {
    width: 56px; height: 56px;
    margin: 0 auto 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--violet), var(--cyan));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 24px rgba(124, 92, 255, 0.35);
  }
  .icon-badge svg { width: 28px; height: 28px; color: white; }

  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 2.6rem;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }

  .hero .subtitle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 40px;
  }
  .hero .subtitle svg { width: 16px; height: 16px; color: var(--cyan); }

  /* Feature card */
  .feature-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    backdrop-filter: blur(20px);
    padding: 22px;
    max-width: 420px;
    margin: 0 auto;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .feature-card:hover { transform: translateY(-6px); box-shadow: 0 36px 70px rgba(0,0,0,0.5); }

  .card-media { border-radius: 18px; overflow: hidden; margin-bottom: 18px; border: 1px solid var(--card-border); }
  .card-media img { width: 100%; height: 220px; object-fit: cover; display: block; transition: transform 0.5s ease; }
  .feature-card:hover .card-media img { transform: scale(1.06); }

  .card-text {
    font-size: 1.02rem;
    font-weight: 500;
    margin-bottom: 18px;
  }

  .glow-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    width: 100%;
    background: linear-gradient(135deg, var(--violet), var(--cyan));
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.98rem;
    padding: 14px 0;
    border-radius: 14px;
    box-shadow: 0 10px 26px rgba(124, 92, 255, 0.32);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .glow-btn svg { width: 18px; height: 18px; }
  .glow-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(124, 92, 255, 0.42); }

  /* Status badges */
  .badge-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 46px;
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 999px;
  }
  .status-pill svg { width: 14px; height: 14px; color: var(--cyan); }
  .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s ease-in-out infinite; }

  footer {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 36px 20px;
    color: var(--muted);
    font-size: 0.8rem;
  }

  @keyframes drift1 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px, 50px) scale(1.1); } }
  @keyframes drift2 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px, -40px) scale(1.08); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  @media (max-width: 760px) {
    .nav-bar { flex-direction: column; align-items: stretch; }
    .nav-links { justify-content: center; }
    .hero { padding-top: 200px; }
    .hero h1 { font-size: 2rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
