<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FIVEM CHECK ROLEPLAY</title>
<link rel="icon" href="FiveM.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
:root {
  --bg-dark: #080b11;
  --bg-card: rgba(17, 24, 39, 0.7);
  --primary: #38bdf8;
  --primary-glow: rgba(56, 189, 248, 0.3);
  --accent: #059669;
  --text-main: #f3f4f6;
  --text-muted: #9ca3af;
  --border-color: rgba(255, 255, 255, 0.08);
  --radius-lg: 20px;
  --radius-md: 12px;
}

*{ box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Noto Sans Thai', sans-serif;
  min-height: 100vh;
  background-color: var(--bg-dark);
  /* พื้นหลังไล่เฉดสีลึกแบบพรีเมียม */
  background-image: 
    radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.12) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
header {
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  background: rgba(8, 11, 17, 0.75);
  border-bottom: 1px solid var(--border-color);
  padding: 16px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 1px;
  background: linear-gradient(135deg, #fff 40%, var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

nav { display: flex; gap: 12px; }
nav a {
  text-decoration: none;
  color: var(--text-muted);
  padding: 8px 16px;
  border-radius: var(--radius-md);
  font-weight: 500;
  font-size: 0.95rem;
  transition: all 0.25s ease;
}

nav a:hover {
  color: #fff;
  background: rgba(255, 255, 255, 0.05);
}

/* แอคทีฟสำหรับหน้าปัจจุบัน (เลือกปรับใช้ได้) */
nav a.active {
  color: var(--primary);
  background: rgba(56, 189, 248, 0.1);
}

/* ===== MAIN CONTAINER ===== */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 20px;
  gap: 30px;
}

.card {
  width: 100%;
  max-width: 680px;
  background: var(--bg-card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg);
  padding: 40px;
  border: 1px solid var(--border-color);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.card h1 {
  text-align: center;
  font-size: 1.8rem;
  font-weight: 700;
  margin-bottom: 35px;
  letter-spacing: 0.5px;
  color: #fff;
}

/* ===== FORM ELEMENTS ===== */
form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

label {
  font-weight: 500;
  font-size: 0.9rem;
  color: var(--text-muted);
}

select, input {
  width: 100%;
  padding: 14px 16px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-color);
  background: rgba(0, 0, 0, 0.2);
  color: #fff;
  font-size: 0.95rem;
  transition: all 0.2s ease;
  font-family: inherit;
}

select:focus, input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
  background: rgba(0, 0, 0, 0.4);
}

/* เปลี่ยนสี Placeholder */
::placeholder { color: rgba(255, 255, 255, 0.25); }

button {
  margin-top: 10px;
  padding: 16px;
  border: none;
  border-radius: var(--radius-md);
  font-weight: 600;
  font-size: 1rem;
  cursor:pointer;
  background: var(--primary);
  color: #040810;
  transition: all 0.2s ease;
  box-shadow: 0 4px 14px var(--primary-glow);
}

button:hover {
  background: #7dd3fc;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
}

button:active { transform: translateY(1px); }

/* ===== RESULT SECTION ===== */
#result {
  width: 100%;
  max-width: 680px;
  border-radius: var(--radius-lg);
  transition: all 0.3s ease;
}

/* กล่องครอบสไตล์ตอนโหลดและสไตล์แสดงผลจริง */
.result-box {
  background: rgba(17, 24, 39, 0.6);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 30px;
  animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border-color);
  padding-bottom: 16px;
  margin-bottom: 20px;
}

.result-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--primary);
}

.server-badge {
  font-size: 0.8rem;
  background: rgba(255, 255, 255, 0.06);
  padding: 4px 12px;
  border-radius: 20px;
  color: var(--text-muted);
  border: 1px solid var(--border-color);
}

/* จัดแสดงผลแบบ Grid คล้ายหน้า Dashboard */
.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}

.info-item {
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.03);
  padding: 14px 18px;
  border-radius: var(--radius-md);
}

.info-item.full-width {
  grid-column: span 2;
}

.info-label {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.info-value {
  font-size: 1rem;
  font-weight: 500;
  word-break: break-all;
}

.info-value a {
  color: var(--primary);
  text-decoration: none;
  transition: color 0.2s;
}
.info-value a:hover { text-decoration: underline; }

/* สถานะ Error/Loading */
.status-msg {
  text-align: center;
  padding: 20px;
  color: var(--text-muted);
  font-size: 0.95rem;
}
.status-error {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.06);
  border: 1px solid rgba(239, 68, 68, 0.2);
  border-radius: var(--radius-md);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 24px;
  background: rgba(8, 11, 17, 0.9);
  border-top: 1px solid var(--border-color);
  font-size: 0.85rem;
  color: rgba(255, 255, 255, 0.3);
  letter-spacing: 0.5px;
}

/* ===== RESPONSIVE ===== */
@media(max-width: 640px){
  header { padding: 16px 20px; }
  .logo { font-size: 1.2rem; }
  nav { gap: 4px; }
  nav a { padding: 6px 10px; font-size: 0.85rem; }
  
  main { padding: 30px 16px; }
  .card { padding: 24px; }
  .card h1 { font-size: 1.5rem; margin-bottom: 25px; }
  .form-row { grid-template-columns: 1fr; gap: 20px; }
  .info-grid { grid-template-columns: 1fr; }
  .info-item.full-width { grid-column: span 1; }
}
</style>
</head>

<body>

<header>
  <div class="logo">FIVEM CHECK</div>
  <nav>
    <a href="menu.html">เมนูหลัก</a>
    <a href="training.html">FIVEM TRAINING</a>
    <a href="https://www.facebook.com/lakksjslal.ksksiksks" target="_blank">รายงาน</a>
    <a href="index.html" style="color: #ef4444;">ออกจากระบบ</a>
  </nav>
</header>

<main>
  <div class="card">
    <h1>CHECK ROLEPLAY FIVEM</h1>

    <form id="checkForm" onsubmit="event.preventDefault(); checkPlayer();">
      
      <div class="form-row">
        <div class="form-group">
          <label for="serverSelect">เลือกเซิร์ฟเวอร์</label>
          <select id="serverSelect">
            <option value="">- เลือกเซิร์ฟเวอร์ -</option>
            <option value="191.96.93.37">WINTER COMMUNITY</option>
            <option value="146.19.69.188">WHAT UNIVERSAL</option>
            <option value="89.38.101.60">SUMMER CITY</option>
            <option value="103.91.190.251">LAST CITY</option>
            <option value="89.38.101.50">HYPER TOWN</option>
            <option value="103.91.190.87">SEOLU CITY</option>
            <option value="89.38.101.89">CUPID ROPLAY</option>
            <option value="103.167.193.64">MITH COMMUNITY</option>
            <option value="191.96.92.203">SURF TOWN</option>
            <option value="nova-nontrp.com">NOVA</option>
            <option value="146.19.69.69">WHAT CITY</option>
            <option value="nightcfx.com">night CITY</option>
            <option value="103.91.190.40">XD SCOOL</option>
            <option value="testtown.rebirthz.in.th">TESTTOWN</option>
          </select>
        </div>

        <div class="form-group">
          <label for="manualIp">กรอก IP เซิร์ฟเวอร์เอง</label>
          <input type="text" id="manualIp" placeholder="เช่น 123.45.67.89" />
        </div>
      </div>

      <div class="form-group">
        <label for="playerIdInput">Player ID</label>
        <input type="text" id="playerIdInput" placeholder="กรอกไอดีผู้เล่น เช่น 1, 2, 5" required />
      </div>

      <button type="submit" id="submitBtn">ค้นหาข้อมูล</button>
    </form>
  </div>

  <section id="result"></section>
</main>

<footer>
  © 2026 FIVEM CHECK • DESIGNED FOR DEV JUTI STORY
</footer>

<script>
  async function checkPlayer() {
    const serverSelect = document.getElementById('serverSelect').value.trim();
    const manualIp = document.getElementById('manualIp').value.trim();
    const playerId = document.getElementById('playerIdInput').value.trim();
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    const serverIp = manualIp || serverSelect;

    if (!serverIp || !playerId) {
      resultDiv.innerHTML = `
        <div class="status-msg status-error">
          ⚠️ กรุณาเลือกหรือกรอก IP เซิร์ฟเวอร์ และกรอก Player ID ให้ถูกต้อง
        </div>`;
      return;
    }

    // เอฟเฟกต์ระหว่างโหลดข้อมูล
    submitBtn.innerText = "กำลังค้นหา...";
    submitBtn.disabled = true;
    resultDiv.innerHTML = `
      <div class="status-msg">
        <p>กำลังค้นหาข้อมูลผู้เล่น ID <strong>${playerId}</strong> จากเซิร์ฟเวอร์ <strong>${serverIp}</strong>...</p>
      </div>`;

    try {
      const response = await fetch(`https://bothp.onrender.com/check-player?server=${serverIp}&player=${playerId}`);
      const data = await response.json();

      if (data && data.name) {
        const steamProfile = data.steamProfile && data.steamProfile !== "ไม่พบข้อมูล"
          ? `<a href="${data.steamProfile}" target="_blank" rel="noopener noreferrer">เปิดลิงก์โปรไฟล์</a>`
          : '<span style="color:var(--text-muted)">ไม่พบข้อมูล</span>';

        // รีดีไซน์หน้าตาการแสดงผลใหม่ในรูปแบบ Grid Dashboard
        resultDiv.innerHTML = `
          <div class="result-box">
            <div class="result-header">
              <div class="result-title">ข้อมูลผู้เล่นระบบพบแล้ว</div>
              <div class="server-badge">${serverIp}</div>
            </div>
            
            <div class="info-grid">
              <div class="info-item">
                <div class="info-label">ชื่อผู้เล่น</div>
                <div class="info-value" style="color: #fff; font-weight:700;">${data.name}</div>
              </div>
              
              <div class="info-item">
                <div class="info-label">ค่าความหน่วง (Ping)</div>
                <div class="info-value" style="color: ${data.ping < 100 ? '#10b981' : '#f59e0b'}">
                  ${data.ping ?? 'ไม่พบข้อมูล'} ms
                </div>
              </div>
              
              <div class="info-item full-width">
                <div class="info-label">Steam Hex</div>
                <div class="info-value" style="font-family: monospace; font-size:0.9rem; color:#cbd5e1;">
                  ${data.steamHex ?? 'ไม่พบข้อมูล'}
                </div>
              </div>
              
              <div class="info-item">
                <div class="info-label">Steam Profile</div>
                <div class="info-value">${steamProfile}</div>
              </div>
              
              <div class="info-item">
                <div class="info-label">Discord ID</div>
                <div class="info-value" style="color:#8b5cf6;">${data.discord ?? 'ไม่พบข้อมูล'}</div>
              </div>
            </div>
          </div>
        `;
      } else {
        resultDiv.innerHTML = `
          <div class="status-msg status-error">
            ❌ ไม่พบข้อมูลผู้เล่นในเซิร์ฟเวอร์นี้
          </div>`;
      }
    } catch (error) {
      resultDiv.innerHTML = `
        <div class="status-msg status-error">
          ❌ เกิดข้อผิดพลาด: ไม่สามารถเชื่อมต่อ API ได้ (${error.message})
        </div>`;
    } finally {
      // คืนค่าปุ่มให้กดใหม่ได้
      submitBtn.innerText = "ค้นหาข้อมูล";
      submitBtn.disabled = false;
    }
  }
</script>

</body>
</html>
