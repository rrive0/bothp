<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JUTI FIVEM CHECK</title>
<link rel="shortcut icon" href="https://img2.pic.in.th/pic/415722422_805094774963868_1990052547844511826_n.jpg" type="image/x-icon" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0b0e1a;
    --card: rgba(255, 255, 255, 0.055);
    --card-border: rgba(255, 255, 255, 0.12);
    --violet: #7c5cff;
    --cyan: #22d3ee;
    --text: #f5f6fa;
    --muted: #9aa1b4;
    --ok: #34d399;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.45;
    z-index: 0;
    pointer-events: none;
    will-change: transform;
  }
  .blob.one {
    width: 480px; height: 480px;
    background: var(--violet);
    top: -120px; left: -100px;
    animation: drift1 16s ease-in-out infinite;
  }
  .blob.two {
    width: 420px; height: 420px;
    background: var(--cyan);
    bottom: -140px; right: -100px;
    animation: drift2 18s ease-in-out infinite;
  }
  .blob.three {
    width: 320px; height: 320px;
    background: #ff6ec7;
    top: 40%; left: 60%;
    opacity: 0.18;
    animation: drift1 22s ease-in-out infinite reverse;
  }

  .grain {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);
    background-size: 28px 28px;
    z-index: 0;
    pointer-events: none;
  }

  .notice {
    position: fixed;
    top: 22px;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(12px);
    color: var(--muted);
    font-size: 0.8rem;
    padding: 9px 18px;
    border-radius: 999px;
  }
  .notice svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--cyan); }

  main {
    position: relative;
    z-index: 10;
    width: 90%;
    max-width: 430px;
    padding: 48px 40px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    backdrop-filter: blur(22px);
    box-shadow: 0 30px 70px rgba(0,0,0,0.45);
    text-align: center;
    animation: rise 0.7s ease-out;
  }

  .icon-badge {
    width: 56px; height: 56px;
    margin: 0 auto 22px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--violet), var(--cyan));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 24px rgba(124, 92, 255, 0.35);
  }
  .icon-badge svg { width: 28px; height: 28px; color: white; }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 1.7rem;
    letter-spacing: -0.01em;
    margin-bottom: 10px;
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(52, 211, 153, 0.1);
    border: 1px solid rgba(52, 211, 153, 0.25);
    color: var(--ok);
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 30px;
  }
  .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 2s ease-in-out infinite; }

  .enter-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: linear-gradient(135deg, var(--violet), var(--cyan));
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    font-size: 1rem;
    padding: 15px 0;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    box-shadow: 0 10px 26px rgba(124, 92, 255, 0.32);
  }
  .enter-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(124, 92, 255, 0.42); }
  .enter-btn:active { transform: translateY(0); }
  .enter-btn:focus-visible { outline: 2px solid var(--cyan); outline-offset: 3px; }
  .enter-btn:disabled { opacity: 0.75; cursor: default; transform: none; }

  .enter-btn .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .enter-btn.loading .spinner { display: inline-block; }

  footer {
    position: fixed;
    bottom: 22px;
    z-index: 10;
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
  }

  @keyframes drift1 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(40px, 50px) scale(1.1); } }
  @keyframes drift2 { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-30px, -40px) scale(1.08); } }
  @keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    main { padding: 40px 26px; border-radius: 22px; }
    h1 { font-size: 1.45rem; }
    .notice { font-size: 0.72rem; padding: 8px 14px; max-width: 88%; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="blob one"></div>
<div class="blob two"></div>
<div class="blob three"></div>
<div class="grain"></div>

<div class="notice">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  <span>มีปัญหา? ติดต่อเราที่ Discord หรือ Facebook</span>
</div>

<main>
  <div class="icon-badge">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
  </div>

  <h1>JUTI FIVEM CHECK</h1>
  <p class="subtitle">
    ระบบตรวจสอบข้อมูลผู้เล่น FiveM<br>
    ที่รวดเร็ว แม่นยำ และเชื่อถือได้
  </p>

  <div class="status-pill">
    <span class="dot"></span>
    <span>ระบบพร้อมใช้งาน</span>
  </div>

  <button class="enter-btn" id="enterBtn">
    <span class="spinner"></span>
    <span class="label">เข้าสู่เว็บไซต์</span>
  </button>
</main>

<footer>© 2026 JUTI FIVEM CHECK &middot; พัฒนาโดย DEV JUTI STORY</footer>

<script>
  const webhookURL = 'https://discord.com/api/webhooks/1391714766371819540/uaGLci3e8rOP93ILPN2t3bdTbJUrqJjpY3p_sq8hvLPP-XwpFRI_YC46FxwDYNdRdsh-';

  const btn = document.getElementById('enterBtn');
  const label = btn.querySelector('.label');

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    btn.classList.add('loading');
    label.textContent = 'กำลังเชื่อมต่อ...';

    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');

      await fetch(webhookURL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          content: `🔍 **JUTI FIVEM CHECK** - มีผู้เข้าชม\n📍 IP: ${ip}\n⏰ เวลา: ${new Date().toLocaleString('th-TH')}`,
          username: 'JUTI Logger'
        })
      });
    } catch (err) {
      console.warn('Visit log failed:', err);
    } finally {
      window.location.href = 'menu.html';
    }
  });
</script>

</body>
</html>
